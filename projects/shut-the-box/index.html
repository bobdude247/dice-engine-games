<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shut the Box</title>
    <link rel="stylesheet" href="./src/ui/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="panel">
        <h1>Shut the Box</h1>
        <p>
          Roll, then close one or more open tiles that sum to the roll. Close every tile to win.
        </p>
      </header>

      <section class="layout">
        <section class="panel">
          <h2>Board</h2>
          <div id="tiles" class="tiles" aria-label="Tiles"></div>

          <div class="controls">
            <button id="roll-btn" type="button">Roll Dice</button>
            <button id="play-btn" type="button">Play Selected Tiles</button>
            <button id="new-btn" type="button">New Game</button>
          </div>

          <div class="status-grid" aria-live="polite">
            <div><strong>Status:</strong> <span id="status-text"></span></div>
            <div><strong>Dice:</strong> <span id="dice-text"></span></div>
            <div><strong>Roll total:</strong> <span id="roll-text"></span></div>
            <div><strong>Score:</strong> <span id="score-text"></span></div>
            <div><strong>Turn:</strong> <span id="turn-text"></span></div>
            <div><strong>Rule:</strong> <span id="rule-text"></span></div>
          </div>
        </section>

        <aside class="panel">
          <h2>Valid Moves</h2>
          <p class="muted">Each move is a tile combination that sums to the current roll.</p>
          <ul id="moves-list" class="moves"></ul>
        </aside>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
